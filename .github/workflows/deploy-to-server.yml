name: Deploy build file to server
on:
  workflow_call:
jobs:
  deploy:

    runs-on: CI, self-hosted, linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ssh to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_EC2_HOST }}
          username: ${{ secrets.SERVER_EC2_USER }}
          key: ${{ secrets.DEPLOY_EC2_SSH_KEY }}
          port: ${{ vars.SERVER_SSH_PORT }}
          script: |
            sudo apt-get update
            echo "Pulling latest changes from git repository..."
            mkdir -p ~/Josh_app
            echo "Directory is created"