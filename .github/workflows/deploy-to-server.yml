# This workflow is triggered when a new release is published. It deploys the application to the server using SSH.
name: Deploy to server
on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: SSH to Pro Server and Deploy
              uses: appleboy/ssh-action@v0.1.7
              with:
                host: ${{ secrets.SERVER_HOST }}
                username: ${{ secrets.SERVER_USER }}
                key: ${{ secrets.SERVER_SSH_KEY }}
                script: |
                  echo "Starting Deployment...."
                  docker compose up -d
                  cd /path/to/app
                  git pull origin main
                  npm install
                  npm run build
                  pm2 restart app