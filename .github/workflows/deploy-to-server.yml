name: Deploy build file to server
on:
  workflow_call:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: ssh to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_EC2_HOST }}
          username: ${{ vars.SERVER_EC2_USER }}
          key: ${{ secrets.DEPLOY_EC2_SSH_KEY }}
          port: 22
          script: |
            sudo apt-get update
            echo "Pulling latest changes from git repository..."
            mkdir -p ~/Josh_app
            echo "Directory is created"
      
      - name: Checkout code
        uses: actions/checkout@v4
