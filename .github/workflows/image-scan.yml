#Uses trivy image scanner to scan the docker image for vulnerabilities and quality issues. The workflow is triggered by a workflow call from the docker build and push workflow after the image is built and pushed to the registry.

name: image quality dependency scan
on:
  workflow_call:

jobs:
    trivy-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Trivy image scan
              uses: aquasecurity/trivy-action@v0.2.0
              with:
                image-ref: ${{ vars.DOCKER_USERNAME }}/github-actions-app:latest
                format: 'table'
                exit-code: '1'
                severity: 'CRITICAL, HIGH'
