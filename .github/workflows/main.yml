name: python lint

on:
    push:
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Python
              usus: actions/setup-python@v5
                with:
                    python-version: '3.13'
            - name: Install dependencies
              run: pip install -r requirements.txt

              - name: run linten
              run: flake8 app.py
